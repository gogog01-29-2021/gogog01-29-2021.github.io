# -----------------------------------------------------------------------------
# Blog topic taxonomy  (edit THIS file to manage categories)
# -----------------------------------------------------------------------------
# - Each top-level entry is a BIG category.
# - `children:` holds SUB-categories (add/remove freely).
# - `slug:` is the Jekyll category string. A post appears under a node when its
#   front matter declares:   categories: [<slug>]
#
# ROLL-UP: a post that should show under a big category AND a sub-category
# declares BOTH slugs, e.g.  categories: [math, probability].  Jekyll registers
# the post under every slug in the list, so the big category aggregates all of
# its children automatically.
#
# To ADD a big category:   add a new top-level "- name: / slug:" block.
# To ADD a sub category:   add an entry under that big category's `children:`.
# A category page becomes browsable once at least one post uses its slug.
# -----------------------------------------------------------------------------

- name: LLM
  slug: llm
  children:
    - name: AI Agents
      slug: ai-agents

- name: Math
  slug: math
  children:
    - name: Topology
      slug: topology
    - name: Set Theory
      slug: set-theory
    - name: Calculus
      slug: calculus
    - name: Linear Algebra
      slug: linear-algebra
    - name: Differential Equations
      slug: differential-equations
    - name: Probability & Stochastic Processes
      slug: probability
    - name: Finance
      slug: finance

- name: Physics
  slug: physics
  children: []

- name: Reading
  slug: reading
  children:
    - name: Books
      slug: books
    - name: Papers
      slug: papers
